version: 2

unit_tests:
  - name: int_subscriptions_resolved_active_wins_over_pending_overlap
    model: int_subscriptions_resolved
    given:
      - input: ref('raw_subscriptions')
        rows:
          - {subscription_id: 'sub_pending', customer_id: 1, plan_id: 'basic', status_code: 'pending', subscription_start_date: '2024-01-01', subscription_end_date: '2024-01-31'}
          - {subscription_id: 'sub_active', customer_id: 1, plan_id: 'basic', status_code: 'active', subscription_start_date: '2024-01-10', subscription_end_date: '2024-01-20'}
      - input: ref('raw_plans')
        rows:
          - {plan_id: 'basic', plan_name: 'Basic', monthly_cost: 31.00}
    expect:
      rows:
        - {customer_id: 1, resolved_subscription_id: 'sub_pending', resolved_plan_id: 'basic', resolved_status: 'pending', resolved_start_date: '2024-01-01', resolved_end_date: '2024-01-09', monthly_cost: 31.00, is_billable: false}
        - {customer_id: 1, resolved_subscription_id: 'sub_active', resolved_plan_id: 'basic', resolved_status: 'active', resolved_start_date: '2024-01-10', resolved_end_date: '2024-01-20', monthly_cost: 31.00, is_billable: true}
        - {customer_id: 1, resolved_subscription_id: 'sub_pending', resolved_plan_id: 'basic', resolved_status: 'pending', resolved_start_date: '2024-01-21', resolved_end_date: '2024-01-31', monthly_cost: 31.00, is_billable: false}

  - name: int_subscriptions_resolved_same_day_transition_prefers_new_active_interval
    model: int_subscriptions_resolved
    given:
      - input: ref('raw_subscriptions')
        rows:
          - {subscription_id: 'sub_cancelled', customer_id: 2, plan_id: 'basic', status_code: 'cancelled', subscription_start_date: '2024-01-01', subscription_end_date: '2024-01-15'}
          - {subscription_id: 'sub_active', customer_id: 2, plan_id: 'pro', status_code: 'active', subscription_start_date: '2024-01-15', subscription_end_date: null}
      - input: ref('raw_plans')
        rows:
          - {plan_id: 'basic', plan_name: 'Basic', monthly_cost: 31.00}
          - {plan_id: 'pro', plan_name: 'Pro', monthly_cost: 62.00}
    expect:
      rows:
        - {customer_id: 2, resolved_subscription_id: 'sub_cancelled', resolved_plan_id: 'basic', resolved_status: 'cancelled', resolved_start_date: '2024-01-01', resolved_end_date: '2024-01-14', monthly_cost: 31.00, is_billable: true}
        - {customer_id: 2, resolved_subscription_id: 'sub_active', resolved_plan_id: 'pro', resolved_status: 'active', resolved_start_date: '2024-01-15', resolved_end_date: null, monthly_cost: 62.00, is_billable: true}

models:
  - name: int_subscriptions_resolved
    description: >
      Canonical resolved subscription timeline with one non-overlapping continuous
      interval per customer winner. This model standardises raw status values,
      resolves contradictory overlaps using deterministic precedence, keeps
      pending intervals as non-billable timeline states, and feeds both the
      customer and revenue marts.
    columns:
      - name: customer_id
        description: Customer identifier for the resolved subscription interval.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('raw_customers')
                field: customer_id
      - name: resolved_subscription_id
        description: Winning raw subscription identifier retained for lineage.
        data_tests:
          - not_null
      - name: resolved_plan_id
        description: Winning plan identifier for the resolved interval.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('raw_plans')
                field: plan_id
      - name: resolved_status
        description: >
          Standardised resolved status with accepted values active, cancelled,
          and pending. Pending remains in the timeline but is not billable.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'cancelled', 'pending']
      - name: resolved_start_date
        description: Inclusive start date for the resolved continuous interval.
        data_tests:
          - not_null
      - name: resolved_end_date
        description: Inclusive end date for the resolved interval, null if open-ended.
      - name: monthly_cost
        description: >
          Monthly plan price from raw_plans. Treated as plan-derived and stable
          for the resolved interval contract.
      - name: is_billable
        description: >
          True for active and cancelled resolved intervals, false for pending
          resolved intervals.
        data_tests:
          - not_null

  - name: int_customers_enriched
    description: >
      Cleaned one-row-per-customer profile model used by dim_customers. This
      model standardises customer-facing attributes only and intentionally does
      not join subscription history.
    columns:
      - name: customer_id
        description: Unique customer identifier.
        data_tests:
          - unique
          - not_null
      - name: customer_name
        description: Trimmed customer name from the seeded raw customer input.
      - name: customer_email
        description: Lowercased and trimmed customer email address.
        data_tests:
          - not_null
      - name: signup_at
        description: Customer signup timestamp from the seeded raw customer input.
        data_tests:
          - not_null
      - name: region
        description: Cleaned region value with literal None converted to null.
      - name: marketing_source
        description: Cleaned marketing source value with literal None converted to null.
