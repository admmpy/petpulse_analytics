version: 2

unit_tests:
  - name: fct_mrr_monthly_mid_month_cancellation_prorates_revenue
    model: fct_mrr_monthly
    given:
      - input: ref('int_subscriptions_resolved')
        rows:
          - {customer_id: 10, resolved_subscription_id: 'sub_cancelled', resolved_plan_id: 'basic', resolved_status: 'cancelled', resolved_start_date: '2024-01-10', resolved_end_date: '2024-01-20', monthly_cost: 31.00, is_billable: true}
    expect:
      rows:
        - {customer_id: 10, revenue_month: '2024-01-01', active_days_in_month: 11, days_in_month: 31, mrr_amount: 11.00}

  - name: fct_mrr_monthly_mid_month_plan_switch_sums_prorated_revenue
    model: fct_mrr_monthly
    given:
      - input: ref('int_subscriptions_resolved')
        rows:
          - {customer_id: 11, resolved_subscription_id: 'sub_basic', resolved_plan_id: 'basic', resolved_status: 'active', resolved_start_date: '2024-01-01', resolved_end_date: '2024-01-15', monthly_cost: 31.00, is_billable: true}
          - {customer_id: 11, resolved_subscription_id: 'sub_pro', resolved_plan_id: 'pro', resolved_status: 'active', resolved_start_date: '2024-01-16', resolved_end_date: '2024-01-31', monthly_cost: 62.00, is_billable: true}
    expect:
      rows:
        - {customer_id: 11, revenue_month: '2024-01-01', active_days_in_month: 31, days_in_month: 31, mrr_amount: 47.00}

models:
  - name: fct_mrr_monthly
    description: >
      Customer-month recurring revenue fact with one row for each customer-month
      where billable recurring revenue exists; customer-months with no billable
      revenue are intentionally omitted. MRR is defined as the prorated share
      of monthly plan price earned during billable active days in the month
      after overlapping raw subscriptions have been resolved upstream. Pending
      intervals are excluded because they are non-billable. Open-ended
      intervals are extended only to the latest observable date in the supplied
      dataset so the result remains reproducible for this static take-home
      exercise, which means the final month in the fact may be partial.
    columns:
      - name: customer_id
        description: Customer identifier for a revenue-bearing customer-month row.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('raw_customers')
                field: customer_id
      - name: revenue_month
        description: >
          First day of the calendar month for a revenue-bearing customer-month
          row. Months with zero billable recurring revenue are not materialised
          in this fact.
        data_tests:
          - not_null
      - name: active_days_in_month
        description: Total billable active days attributed to the customer within the month.
      - name: days_in_month
        description: Total number of days in the calendar month.
      - name: mrr_amount
        description: >
          Prorated recurring revenue calculated as SUM(monthly_cost *
          active_days_in_month / days_in_month) across all sequential billable
          intervals in the month. For open-ended subscriptions, the final month
          is capped to the latest observable date in the supplied dataset.
        data_tests:
          - not_null

  - name: dim_customers
    description: >
      Business-facing one-row-per-customer dimension combining cleaned customer
      attributes, current subscription state, and total lifetime value derived
      from prorated monthly recurring revenue within the supplied dataset
      window. Current status is taken from the latest resolved subscription
      interval, while current plan fields are populated only for open-ended
      current subscriptions.
    columns:
      - name: customer_id
        description: Unique customer identifier.
        data_tests:
          - unique
          - not_null
      - name: customer_name
        description: Cleaned customer name.
      - name: customer_email
        description: Cleaned customer email address.
        data_tests:
          - not_null
      - name: region
        description: Cleaned customer region.
      - name: signup_at
        description: Customer signup timestamp.
      - name: current_subscription_status
        description: >
          Current resolved subscription status from the latest resolved
          interval, even when the latest state is cancelled or pending.
      - name: total_lifetime_value
        description: >
          Sum of prorated monthly recurring revenue across all revenue-bearing
          months available in the supplied dataset window.
      - name: marketing_source
        description: Cleaned marketing source value.
      - name: current_plan_id
        description: Current plan identifier from the latest open-ended resolved interval, if present.
      - name: current_plan_name
        description: Current plan name from the latest open-ended resolved interval, if present.
      - name: current_monthly_cost
        description: Current monthly plan cost from the latest open-ended resolved interval, if present.
      - name: current_subscription_start_date
        description: Start date of the latest open-ended resolved interval, if present.
      - name: first_subscription_start_date
        description: Earliest resolved subscription start date observed for the customer.
      - name: latest_subscription_end_date
        description: Latest non-null resolved subscription end date observed for the customer.
      - name: has_ever_billable_subscription
        description: True when the customer has ever had a billable resolved interval.
      - name: has_ever_cancelled
        description: True when the customer has ever had a resolved cancelled interval.
